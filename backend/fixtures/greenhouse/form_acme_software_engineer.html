<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Software Engineer at Acme Labs</title>
  <!-- Sanitized Greenhouse-like apply form fixture (M0). No real PII. No submit handlers that post. -->
</head>
<body>
  <h1>Software Engineer at Acme Labs</h1>
  <div id="grnhse_app">
    <form id="application_form" action="#" method="post" onsubmit="return false;">
      <label for="first_name">First Name *</label>
      <input id="first_name" name="first_name" type="text" required />

      <label for="last_name">Last Name *</label>
      <input id="last_name" name="last_name" type="text" required />

      <label for="email">Email *</label>
      <input id="email" name="email" type="email" required />

      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="tel" />

      <label for="city">City</label>
      <input id="city" name="job_application[location][city]" type="text" />

      <label for="state">State</label>
      <input id="state" name="job_application[location][state]" type="text" />

      <label for="country">Country *</label>
      <select id="country" name="job_application[location][country]" required>
        <option value="">Select...</option>
        <option value="US">United States</option>
        <option value="CA">Canada</option>
      </select>

      <label for="postal">Postal Code</label>
      <input id="postal" name="job_application[location][postal_code]" type="text" />

      <label for="linkedin">LinkedIn Profile</label>
      <input id="linkedin" name="question_linkedin" type="url" />

      <label for="portfolio">Portfolio</label>
      <input id="portfolio" name="question_portfolio" type="url" />

      <label for="github">GitHub URL</label>
      <input id="github" name="question_github" type="url" />

      <label for="company">Current Company</label>
      <input id="company" name="question_company" type="text" />

      <label for="title">Current Title</label>
      <input id="title" name="question_title" type="text" />

      <label for="resume">Resume/CV *</label>
      <input id="resume" name="resume" type="file" accept=".pdf,.doc,.docx" required />

      <label for="cover">Cover Letter</label>
      <input id="cover" name="cover_letter" type="file" accept=".pdf,.doc,.docx" />

      <label for="cover_text">Cover Letter</label>
      <textarea id="cover_text" name="cover_letter_text"></textarea>

      <fieldset>
        <legend>Are you legally authorized to work in the United States? *</legend>
        <label><input type="radio" name="question_work_auth" value="yes" required /> Yes</label>
        <label><input type="radio" name="question_work_auth" value="no" /> No</label>
      </fieldset>

      <fieldset>
        <legend>Will you now or in the future require sponsorship for employment visa status? *</legend>
        <label><input type="radio" name="question_sponsorship" value="yes" required /> Yes</label>
        <label><input type="radio" name="question_sponsorship" value="no" /> No</label>
      </fieldset>

      <label for="why">Why are you interested in this role? *</label>
      <textarea id="why" name="question_why" required></textarea>

      <label for="hear">How did you hear about this job?</label>
      <select id="hear" name="question_hear">
        <option value="">Select...</option>
        <option value="linkedin">LinkedIn</option>
        <option value="friend">Friend</option>
      </select>

      <fieldset>
        <legend>Which technologies have you used?</legend>
        <label><input type="checkbox" name="question_tech[]" value="python" /> Python</label>
        <label><input type="checkbox" name="question_tech[]" value="react" /> React</label>
      </fieldset>

      <fieldset>
        <legend>Gender (Voluntary Self-Identification)</legend>
        <label><input type="radio" name="demographic_gender" value="decline" /> Decline to self-identify</label>
      </fieldset>

      <label>
        <input type="checkbox" name="data_compliance[gdpr_consent_given]" value="1" required />
        I certify that my answers are true and complete to the best of my knowledge.
      </label>

      <button type="submit">Submit Application</button>
    </form>
  </div>
</body>
</html>
